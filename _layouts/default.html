<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title }}</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #21262d;
      --text:     #c9d1d9;
      --text-dim: #8b949e;
      --accent:   #58a6ff;
      --green:    #3fb950;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.75;
    }
    header {
      position: sticky; top: 0;
      background: rgba(13,17,23,0.93);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 2rem;
      display: flex; align-items: center; gap: 0.6rem;
      z-index: 100;
    }
    .pulse {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    header h1 { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    header .sub { font-size: 0.8rem; color: var(--text-dim); margin-left: auto; }
    main { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }
    h2 {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim);
      margin: 3rem 0 1.5rem;
      padding-bottom: 0.55rem;
      border-bottom: 1px solid var(--border);
    }
    h2:first-child { margin-top: 0; }
    hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }
    p { margin: 0.55rem 0; }
    strong { color: #e6edf3; }
    ul, ol { padding-left: 1.4rem; margin: 0.35rem 0 0.75rem; }
    li { margin: 0.2rem 0; padding-left: 0.15rem; }

    /* Rapport-titler: 🤖 AI-NYHETER / 🔐 CYBERSIKKERHET */
    p.report-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #e6edf3;
      margin-top: 2rem;
      padding: 0.85rem 1.1rem;
      background: var(--surface);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
    }

    /* Subseksjon-overskrifter: 🧠 Nye modeller / 🚨 Kritiske sårbarheter */
    p.section-header {
      font-size: 0.92rem;
      font-weight: 600;
      color: #e6edf3;
      margin-top: 1.25rem;
      margin-bottom: 0.15rem;
    }

    footer {
      text-align: center; padding: 2rem;
      color: var(--text-dim); font-size: 0.78rem;
      border-top: 1px solid var(--border);
    }
    @media(max-width:600px) {
      header { padding: 0.8rem 1rem; }
      main { padding: 1.5rem 1rem 4rem; }
    }
  </style>
</head>
<body>
  <header>
    <span class="pulse"></span>
    <h1>{{ site.title }}</h1>
    <span class="sub">Automatisk generert</span>
  </header>
  <main>{{ content }}</main>
  <footer>SkuggeAI Research Pipeline &middot; Qwen3 30B + Gemma 4 26B + Qwen3.6 27B + LDR</footer>
  <script>
    document.querySelectorAll('main p').forEach(p => {
      const t = p.textContent;
      if (t.includes('AI-NYHETER') || t.includes('CYBERSIKKERHET')) {
        p.classList.add('report-title');
      } else if (p.querySelector('strong') && /^[\p{Emoji}]/u.test(t.trim())) {
        p.classList.add('section-header');
      }
    });
  </script>
</body>
</html>
