---
layout: default
---
{% for post in paginator.posts %}
{{ post.content }}
{% unless forloop.last %}<hr>{% endunless %}
{% endfor %}

<nav class="pager">
  {% if paginator.next_page %}
    <a href="{{ paginator.next_page_path | relative_url }}">← Eldre rapporter</a>
  {% endif %}
  {% if paginator.previous_page %}
    <a href="{{ paginator.previous_page_path | relative_url }}">Nyere →</a>
  {% endif %}
</nav>
